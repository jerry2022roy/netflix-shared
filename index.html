<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix 共享狀態艙</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#141414">
    <style>
        :root {
            --netflix-red: #e50914;
            --netflix-black: #141414;
            --netflix-green: #46d369;
        }
        body {
            background: radial-gradient(circle at center, #2b2b2b 0%, var(--netflix-black) 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 35px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-dot {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background-color: var(--netflix-green);
            box-shadow: 0 0 30px var(--netflix-green);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .status-dot.busy {
            background-color: var(--netflix-red);
            box-shadow: 0 0 30px var(--netflix-red);
            transform: scale(1.05);
        }
        .status-text {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .user-text {
            font-size: 16px;
            color: #b3b3b3;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        select {
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 10px;
            width: 100%;
            margin-bottom: 15px;
            outline: none;
            box-sizing: border-box;
        }
        .btn {
            background-color: white;
            color: var(--netflix-black);
            border: none;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .btn:active { transform: scale(0.98); }
        .online
